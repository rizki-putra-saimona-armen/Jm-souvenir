{% extends "base.html" %}
{% block title %}Checkout - Trophy Flask{% endblock %}
{% block content %}
<div class="content-card">
  <h3 class="fw-bold mb-4">Checkout</h3>
  
  <!-- Two Column Layout: Form and WhatsApp Option -->
  <div class="row">
    <div class="col-md-7">
      <h5 class="mb-3">Data Pengiriman</h5>
      <form method="POST" action="{{ url_for('cart.confirmation') }}">
        <div class="mb-3">
          <label class="form-label">Nama Lengkap</label>
          <input type="text" name="name" class="form-control" required/>
        </div>
        <div class="mb-3">
          <label class="form-label">Alamat Pengiriman</label>
          <textarea name="address" class="form-control" rows="3" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2">
          <i class="bi bi-check-circle me-2"></i> Konfirmasi Pesanan
        </button>
      </form>
    </div>
    
    <div class="col-md-5">
      <div class="card border-success h-100">
        <div class="card-body text-center">
          <h5 class="card-title mb-3">
            <i class="bi bi-whatsapp text-success" style="font-size: 2rem;"></i>
          </h5>
          <h6 class="card-subtitle mb-3">Ingin Konsultasi Dulu?</h6>
          <p class="card-text text-muted mb-3">
            Hubungi tim Customer Service kami untuk mendapatkan penawaran terbaik dan informasi pengiriman.
          </p>
          <button type="button" class="btn btn-success w-100 py-2" onclick="consultCartWhatsApp()">
            <i class="bi bi-whatsapp me-2"></i> Chat via WhatsApp
          </button>
          <small class="text-muted d-block mt-2">Response Time: ±5 menit</small>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  function consultCartWhatsApp() {
    // Get cart data from session or form
    const message = `Halo, saya ingin melakukan konsultasi untuk pemesanan.\n\nSaya ingin mendapatkan informasi lebih lanjut tentang produk dan penawaran terbaik.`;
    const whatsappUrl = `https://wa.me/6281328029729?text=${encodeURIComponent(message)}`;
    window.open(whatsappUrl, '_blank');
  }
</script>

{% endblock %}
